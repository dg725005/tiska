<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiska Enterprise | Premium Gown Boutique</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background: #fff; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .bg-tiska { background-color: #8a1d6a; } 
        .text-tiska { color: #8a1d6a; }

        .swiper-category { width: 100%; height: 80vh; background-color: #000; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        
        /* Optimization: Use transform instead of filter for blur where possible */
        .main-content { max-width: 100%; max-height: 100%; object-fit: contain; z-index: 10; position: relative; transition: opacity 0.3s; }
        .bg-blur { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(30px); opacity: 0.4; transform: scale(1.1); }
        .slide-overlay { background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%); z-index: 20; }

        /* Skeleton loader for smoother loading feel */
        .swiper-lazy-preloader { border-color: #8a1d6a; }

        .whatsapp-float { z-index: 999; }
    </style>
</head>
<body class="bg-white">

    <nav class="fixed w-full z-[100] bg-white/90 backdrop-blur-md border-b border-slate-100 h-20">
        <div class="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
            <img src="tiska_logo.jpg" alt="Tiska Logo" class="h-10">
            <div class="hidden md:flex gap-8 font-bold text-slate-700 uppercase tracking-tighter text-[10px]">
                <a href="#engagement">Engagement</a>
                <a href="#longtail">Long Tail</a>
                <a href="#maternity">Maternity</a>
                <a href="#prewedding">Pre-Wedding</a>
                <a href="#mascots">Mascots</a>
            </div>
            <a href="https://wa.me/917896325419" class="bg-tiska text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest">Inquire</a>
        </div>
    </nav>

    <script>
        function generateSlider(id, title, folder, count, direction, videos = {}) {
            document.write(`
                <section id="${id}" class="pt-20">
                    <div class="bg-slate-50 py-4 text-center border-b">
                        <h2 class="text-2xl font-bold text-slate-800 uppercase tracking-widest">${title}</h2>
                    </div>
                    <div class="swiper swiper-category" dir="${direction}">
                        <div class="swiper-wrapper">`);
            
            const renderSlide = (src, isVideo, label) => {
                document.write(`
                    <div class="swiper-slide">
                        <div class="bg-blur" style="${isVideo ? 'background-color: #111;' : `background-image: url('${src}')`}"></div>
                        ${isVideo ? 
                            `<video data-src="${src}" preload="none" muted loop playsinline class="swiper-lazy main-content"></video>` : 
                            `<img data-src="${src}" class="swiper-lazy main-content">
                             <div class="swiper-lazy-preloader"></div>`
                        }
                        <div class="absolute inset-0 slide-overlay flex flex-col justify-end p-10 text-white text-center pb-20">
                            <p class="text-tiska font-bold tracking-[0.3em] uppercase text-[10px] mb-2">Tiska Premium</p>
                            <h3 class="text-2xl font-serif italic mb-6">${label}</h3>
                            <a href="https://wa.me/917896325419?text=Interested in ${label}" class="mx-auto bg-white text-slate-900 px-8 py-3 rounded-full font-bold uppercase text-[10px] tracking-widest shadow-lg">Enquire Now</a>
                        </div>
                    </div>`);
            };

            if(videos.start) renderSlide(videos.start, true, title + ' Intro');

            for (let i = 1; i <= count; i++) {
                renderSlide(`${folder}/${folder}${i}.jpg`, false, `${title} #${i}`);
                if(videos.after && videos.afterIndex === i) {
                    renderSlide(videos.after, true, title + ' Spotlight');
                }
            }

            if(videos.end) renderSlide(videos.end, true, title + ' Showcase');

            document.write(`</div><div class="swiper-pagination"></div></div></section>`);
        }
    </script>

    <script>
        generateSlider('engagement', 'Engagement Cocktail Gowns', 'a', 49, 'ltr', { start: 'vid1.mp4', after: 'vid2.mp4', afterIndex: 10 });
        generateSlider('longtail', 'Long Tail Sarree', 'b', 11, 'rtl');
    </script>

    <section id="mascots" class="py-24 bg-slate-900 overflow-hidden">
        <div class="max-w-7xl mx-auto px-6">
            <div class="text-center mb-12 text-white">
                <h2 class="text-4xl font-bold mb-2">MASCOTS</h2>
                <div class="h-1 w-20 bg-tiska mx-auto"></div>
            </div>
            <div class="swiper mascot-swiper">
                <div class="swiper-wrapper">
                    <script>
                        for (let i = 1; i <= 110; i++) {
                            document.write(`
                                <div class="swiper-slide px-2">
                                    <div class="bg-white rounded-2xl overflow-hidden h-full flex flex-col">
                                        <img data-src="c/c${i}.jpg" class="swiper-lazy w-full h-72 object-cover">
                                        <div class="swiper-lazy-preloader"></div>
                                        <div class="p-4 text-center">
                                            <p class="text-[10px] font-bold text-slate-400 uppercase">Mascot #${i}</p>
                                            <a href="https://wa.me/917896325419?text=Mascot Inquiry ${i}" class="text-tiska text-[10px] font-bold border-b border-tiska mt-2 inline-block">RENT NOW</a>
                                        </div>
                                    </div>
                                </div>`);
                        }
                    </script>
                </div>
            </div>
        </div>
    </section>

    <script>
        generateSlider('maternity', 'Maternity Gowns', 'd', 38, 'ltr');
        generateSlider('prewedding', 'Pre Wedding Long Tail Gowns', 'e', 106, 'rtl', { end: 'vid3.mp4' });
    </script>

    <footer class="py-12 bg-white text-center border-t">
        <p class="text-[10px] tracking-[0.5em] text-slate-400 uppercase">© 2026 TISKA ENTERPRISE</p>
    </footer>

    <a href="https://wa.me/917896325419" class="whatsapp-float fixed bottom-8 right-8 bg-[#25D366] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl transition hover:scale-110">
        <i class="fab fa-whatsapp text-2xl"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // GLOBAL CONFIG FOR ALL SLIDERS
        const commonOptions = {
            loop: true,
            lazy: {
                loadPrevNext: true, // Preloads the next image so swiping feels instant
                loadPrevNextAmount: 2
            },
            autoplay: { delay: 4500, disableOnInteraction: true },
            speed: 800,
            pagination: { el: ".swiper-pagination", clickable: true },
        };

        // Initialize main sliders
        document.querySelectorAll('.swiper-category').forEach(el => {
            new Swiper(el, {
                ...commonOptions,
                effect: "fade",
                fadeEffect: { crossFade: true }
            });
        });

        // Initialize mascot slider
        new Swiper(".mascot-swiper", {
            ...commonOptions,
            slidesPerView: 2,
            spaceBetween: 10,
            breakpoints: {
                1024: { slidesPerView: 5 }
            }
        });

        // Optimization: Auto-play video only when visible
        document.addEventListener('lazyloaded', function(e){
            if(e.target.tagName === 'VIDEO') {
                e.target.play();
            }
        });
    </script>
</body>
</html>
